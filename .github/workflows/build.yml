name: Build

# ON-DEMAND FULL build: macOS + Windows installers attached to a GitHub Release.
#
# DEFAULT releases are built locally (Windows only) — no CI minutes:
#   # bump "version" in package.json
#   npm run publish:local            # build Windows + publish the release from your machine
#
# This CI runs ONLY when you want macOS too:
#   git tag vX.Y.Z+mac && git push origin vX.Y.Z+mac
# The "+mac" suffix is only the trigger; the release is named vX.Y.Z (suffix stripped).
# You can also run it from the Actions tab (workflow_dispatch) against an existing tag.
#
# NOTE: GitHub Actions tag filters treat "+" as a special glob char, so the filter
# below is "v*mac" (which matches vX.Y.Z+mac). Do NOT change it to "v*+mac".

on:
  push:
    tags:
      - "v*mac"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build both platforms for, e.g. v0.5.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Resolve the trigger ref (which exists) and the clean release tag (suffix stripped).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      raw: ${{ steps.t.outputs.raw }}
      clean: ${{ steps.t.outputs.clean }}
    steps:
      - id: t
        run: |
          raw="${{ github.event.inputs.tag || github.ref_name }}"
          echo "raw=$raw"          >> "$GITHUB_OUTPUT"
          echo "clean=${raw%+mac}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Build the commit the trigger tag points at (matters for workflow_dispatch).
          ref: ${{ needs.prepare.outputs.raw }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Release builds carry the plain package.json version (which must match the tag).
      - name: Build
        shell: bash
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vite only exposes variables prefixed with VITE_ to the renderer.
          # This is baked into desktop artifacts at build time.
          VITE_GIPHY_API_KEY: ${{ secrets.VITE_GIPHY_API_KEY }}
          # macOS code signing + notarization — electron-builder picks these
          # up automatically. On the windows-latest runner they're inert.
          # CSC_LINK accepts either a file path or a base64 blob; we use the
          # base64 form via the GitHub secret.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiovivo-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Publish under the clean vX.Y.Z tag regardless of the +mac trigger.
          tag_name: ${{ needs.prepare.outputs.clean }}
          name: Tiovivo ${{ needs.prepare.outputs.clean }}
          draft: false
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
